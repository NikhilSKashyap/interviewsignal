services:
  relay:
    build: .
    ports:
      - "8080:8080"
    environment:
      RELAY_API_KEY: ${RELAY_API_KEY:?Set RELAY_API_KEY in .env or environment}
      RELAY_PORT: 8080
      RELAY_DATA_DIR: /data
    volumes:
      - relay_data:/data
    restart: unless-stopped

volumes:
  relay_data:
